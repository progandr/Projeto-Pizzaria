<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pizzaria</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
    }

    header {
      background: #c0392b;
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
    }

    .hero {
      padding: 40px 20px;
    }

    .hero img {
      width: 90%;
      max-width: 400px;
      border-radius: 10px;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background: #25D366;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    .section {
      padding: 30px 20px;
    }
  </style>
</head>
<body>

  <header>
    🍕 Pizzaria
  </header>

  <div class="hero">
    <h1>As melhores pizzas da cidade</h1>
    <p>Feitas no forno a lenha 🔥</p>

    <img src="/images/forno-lenha.jpg" alt="Forno a lenha">

    <br>

    <a class="btn" href="https://wa.me/seunumero">
      Pedir no WhatsApp
    </a>
  </div>

  <div class="section">
    <h2>Sobre nós</h2>
    <p>Trabalhamos com ingredientes de qualidade e preparo artesanal.</p>
  </div>

</body>
</html>
